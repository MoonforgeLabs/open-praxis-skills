# Vendor Dependency Manifest
# 规范文档: alex-skills/docs/vendor-manifest-spec.md
#
# 每次添加/更新依赖时，同步更新此文件和 vendor/ 目录。
# 备份命令: python3 <alex-skills>/scripts/vendor_sync.py --skill praxis-ai-usage-stats

dependencies:
  # --- Python 包 ---
  # (当前无外部 pip 依赖，仅使用标准库)

  # --- CLI 工具 ---
  - name: hook-log-tool-usage
    type: hook
    source: alex-skills/skills/praxis-ai-usage-stats
    description: "Claude Code hook，自动记录 tool 使用到 ~/.claude/tool-usage.log"
    install_path: ~/.claude/hooks/log-tool-usage.sh
    backup_path: vendor/hook-log-tool-usage/
    backup_version: "2026-06-25"
    fallback_note: "如 hook 被删除，从备份恢复到 install_path"

  # --- 依赖的其他 skill ---
  # (当前无跨 skill 依赖)

  # --- 运行时数据源格式 ---
  - name: claude-tool-usage-log-format
    type: runtime-format
    source: "~/.claude/tool-usage.log"
    description: "Claude Code hook 写入的 JSONL 格式，每行一个 tool 调用事件"
    backup_path: vendor/formats/
    backup_version: "2026-06-25"
    fallback_note: "格式文档已备份；如 Claude Code 改变日志格式，需更新 parser"
